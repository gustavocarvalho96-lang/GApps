<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GustavoApps</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f7;
      --panel: #ffffff;
      --text: #0f2230;
      --muted: #64748b;
      --line: #dce5ef;
      --accent: #0f766e;
      --accent-strong: #0b625c;
      --soft: #ecfdf5;
      --shadow: 0 18px 45px rgba(15, 34, 48, 0.09);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(135deg, #f8fafc 0%, #eff7f4 54%, #eaf0f7 100%);
    }

    .app {
      width: min(1120px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 44px 24px 54px;
    }

    .topbar {
      display: grid;
      justify-items: center;
      gap: 14px;
      padding: 8px 0 0;
      text-align: center;
    }

    .brand-logo {
      width: clamp(96px, 14vw, 138px);
      height: clamp(96px, 14vw, 138px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      object-fit: cover;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(2.15rem, 5vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 900;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 22px;
      margin-top: clamp(34px, 6vw, 64px);
    }

    .card {
      display: grid;
      min-height: 168px;
      place-items: center;
      padding: 30px 24px;
      border: 1px solid var(--line);
      border-top: 6px solid var(--accent);
      border-radius: 20px;
      color: inherit;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .card:nth-child(2) {
      border-top-color: #2563eb;
    }

    .card:nth-child(4) {
      border-top-color: #c27a14;
    }

    .card:hover,
    .card:focus-visible {
      color: #ffffff;
      border-color: rgba(15, 118, 110, 0.1);
      border-top-color: rgba(255, 255, 255, 0.65);
      background: linear-gradient(145deg, var(--accent) 0%, var(--accent-strong) 100%);
      box-shadow: 0 24px 56px rgba(15, 34, 48, 0.13);
      transform: translateY(-4px);
      outline: none;
    }

    .card h2 {
      margin: 0;
      text-align: center;
      font-size: clamp(1.35rem, 2.1vw, 1.9rem);
      line-height: 1.04;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    @media (max-width: 860px) {
      .app {
        padding: 22px 16px 34px;
      }

      .brand-logo {
        width: 96px;
        height: 96px;
        border-radius: 22px;
      }

      .grid {
        grid-template-columns: 1fr;
        margin-top: 28px;
      }

      .card {
        min-height: 118px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar" aria-label="GustavoApps">
      <img class="brand-logo" src="shared/logo-stethoscope-c.png" alt="">
      <h1 class="brand-title">GustavoApps</h1>
    </header>

    <section class="grid" aria-label="Aplicativos disponíveis">
      <a class="card" href="GustavoPlantao_Portatil/GustavoPlantao_Portatil/ReceitasMedicas_Portatil.html">
        <div>
          <h2>GPlantão</h2>
        </div>
      </a>

      <a class="card" href="GustavoTranscritorExames_Portatil/GustavoTranscritorExames_Portatil/GustavoTranscritorExames.html">
        <div>
          <h2>GTranscritor</h2>
        </div>
      </a>

      <a class="card" href="FluxoUPA-Portatil/FluxoUPA-Portatil/index.html">
        <div>
          <h2>GFluxo</h2>
        </div>
      </a>

      <a class="card" href="GustavoPendencias/index.html">
        <div>
          <h2>GPendencias</h2>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
