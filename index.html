<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projeto Codex</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f7;
      --panel: #ffffff;
      --text: #0f2230;
      --muted: #64748b;
      --line: #dce5ef;
      --accent: #0f766e;
      --accent-strong: #0b625c;
      --soft: #ecfdf5;
      --shadow: 0 18px 45px rgba(15, 34, 48, 0.09);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(135deg, #f8fafc 0%, #eff7f4 54%, #eaf0f7 100%);
    }

    .app {
      width: min(1120px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 44px 24px 54px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
    }

    .brand-mark {
      display: grid;
      width: 52px;
      height: 52px;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 16px;
      color: #ffffff;
      background: var(--accent);
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.05rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand-copy p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      margin-top: clamp(42px, 9vw, 92px);
    }

    .card {
      display: flex;
      min-height: 330px;
      flex-direction: column;
      justify-content: space-between;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 26px;
      color: inherit;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .card:hover,
    .card:focus-visible {
      border-color: rgba(15, 118, 110, 0.36);
      box-shadow: 0 24px 56px rgba(15, 34, 48, 0.13);
      transform: translateY(-4px);
      outline: none;
    }

    .card.primary {
      color: #ffffff;
      border-color: rgba(15, 118, 110, 0.1);
      background: linear-gradient(145deg, var(--accent) 0%, var(--accent-strong) 100%);
    }

    .icon {
      display: grid;
      width: 46px;
      height: 46px;
      place-items: center;
      border-radius: 15px;
      color: var(--accent);
      background: var(--soft);
      font-weight: 800;
      letter-spacing: 0;
    }

    .primary .icon {
      color: var(--accent-strong);
      background: #ffffff;
    }

    .card h2 {
      margin: 26px 0 10px;
      font-size: clamp(1.75rem, 3vw, 2.35rem);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .card p {
      max-width: 18rem;
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .primary p {
      color: rgba(255, 255, 255, 0.82);
    }

    .action {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-top: 34px;
      padding: 0 18px;
      border-radius: 999px;
      color: var(--accent);
      background: var(--soft);
      font-size: 0.96rem;
      font-weight: 800;
    }

    .primary .action {
      color: var(--accent-strong);
      background: #ffffff;
    }

    @media (max-width: 860px) {
      .app {
        padding: 22px 16px 34px;
      }

      .topbar {
        align-items: flex-start;
        border-radius: 18px;
      }

      .brand-mark {
        width: 46px;
        height: 46px;
        border-radius: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
        margin-top: 28px;
      }

      .card {
        min-height: 245px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar" aria-label="Projeto Codex">
      <div class="brand-mark" aria-hidden="true">C</div>
      <div class="brand-copy">
        <h1>Projeto Codex</h1>
        <p>Plantão, exames e fluxo em um só lugar.</p>
      </div>
    </header>

    <section class="grid" aria-label="Aplicativos disponíveis">
      <a class="card primary" href="GustavoPlantao_Portatil/GustavoPlantao_Portatil/ReceitasMedicas_Portatil.html">
        <div>
          <div class="icon" aria-hidden="true">G</div>
          <h2>Plantão</h2>
          <p>Receitas, anamnese e reavaliação em uma tela organizada.</p>
        </div>
        <span class="action">Abrir</span>
      </a>

      <a class="card" href="GustavoTranscritorExames_Portatil/GustavoTranscritorExames_Portatil/GustavoTranscritorExames.html">
        <div>
          <div class="icon" aria-hidden="true">E</div>
          <h2>Exames</h2>
          <p>Transcrição rápida de resultados laboratoriais.</p>
        </div>
        <span class="action">Abrir</span>
      </a>

      <a class="card" href="FluxoUPA-Portatil/FluxoUPA-Portatil/index.html">
        <div>
          <div class="icon" aria-hidden="true">F</div>
          <h2>Fluxo</h2>
          <p>Distribuição, acompanhamento e exportação da lista.</p>
        </div>
        <span class="action">Abrir</span>
      </a>
    </section>
  </main>
</body>
</html>
