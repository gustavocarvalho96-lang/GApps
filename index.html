<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GApps</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f7;
      --panel: #ffffff;
      --text: #0f2230;
      --muted: #64748b;
      --line: #dce5ef;
      --accent: #0f766e;
      --accent-strong: #0b625c;
      --soft: #ecfdf5;
      --shadow: 0 18px 45px rgba(15, 34, 48, 0.09);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(135deg, #f8fafc 0%, #eff7f4 54%, #eaf0f7 100%);
    }

    .app {
      width: min(1120px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 44px 24px 54px;
    }

    .topbar {
      display: grid;
      justify-items: center;
      gap: 10px;
      padding: 8px 0 0;
      text-align: center;
    }

    .brand-bar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      min-height: 60px;
      padding: 12px 18px 12px 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
    }

    .brand-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.65rem);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 900;
    }

    .brand-separator {
      width: 1px;
      height: 32px;
      background: var(--line);
    }

    .brand-apps {
      display: inline-flex;
      align-items: center;
      gap: 11px;
    }

    .brand-dot {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: inset 0 0 0 4px rgba(255, 255, 255, .72);
    }

    .brand-dot:nth-child(2) { background: #2563eb; }
    .brand-dot:nth-child(3) { background: #c27a14; }
    .brand-dot:nth-child(4) { background: #64748b; }

    .brand-count {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 220px));
      justify-content: center;
      gap: 12px;
      margin-top: clamp(24px, 4vw, 38px);
    }

    .card {
      display: grid;
      min-height: 92px;
      place-items: center;
      padding: 16px 14px;
      border: 1px solid var(--line);
      border-top: 4px solid var(--accent);
      border-radius: 14px;
      color: inherit;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .card:nth-child(2) {
      border-top-color: #2563eb;
    }

    .card:nth-child(4) {
      border-top-color: #c27a14;
    }

    .card:hover,
    .card:focus-visible {
      color: #ffffff;
      border-color: rgba(15, 118, 110, 0.1);
      border-top-color: rgba(255, 255, 255, 0.65);
      background: linear-gradient(145deg, var(--accent) 0%, var(--accent-strong) 100%);
      box-shadow: 0 24px 56px rgba(15, 34, 48, 0.13);
      transform: translateY(-4px);
      outline: none;
    }

    .card h2 {
      margin: 0;
      text-align: center;
      font-size: clamp(1.05rem, 1.45vw, 1.3rem);
      line-height: 1.04;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    @media (max-width: 860px) {
      .app {
        padding: 22px 16px 34px;
      }

      .brand-bar {
        width: min(100%, 360px);
        gap: 12px;
        padding: 11px 14px;
      }

      .brand-title {
        font-size: 2rem;
      }

      .brand-apps {
        gap: 8px;
      }

      .brand-dot {
        width: 18px;
        height: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
        margin-top: 28px;
      }

      .card {
        min-height: 82px;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar" aria-label="GApps">
      <div class="brand-bar">
        <h1 class="brand-title">GApps</h1>
        <div class="brand-separator" aria-hidden="true"></div>
        <div class="brand-apps" aria-label="4 aplicativos">
          <span class="brand-dot" title="GPlantão"></span>
          <span class="brand-dot" title="GTranscritor"></span>
          <span class="brand-dot" title="GFluxo"></span>
          <span class="brand-dot" title="GPendencias"></span>
          <span class="brand-count">4 apps</span>
        </div>
      </div>
    </header>

    <section class="grid" aria-label="Aplicativos disponíveis">
      <a class="card" href="GustavoPlantao_Portatil/GustavoPlantao_Portatil/ReceitasMedicas_Portatil.html">
        <div>
          <h2>GPlantão</h2>
        </div>
      </a>

      <a class="card" href="GustavoTranscritorExames_Portatil/GustavoTranscritorExames_Portatil/GustavoTranscritorExames.html">
        <div>
          <h2>GTranscritor</h2>
        </div>
      </a>

      <a class="card" href="FluxoUPA-Portatil/FluxoUPA-Portatil/index.html">
        <div>
          <h2>GFluxo</h2>
        </div>
      </a>

      <a class="card" href="GustavoPendencias/index.html">
        <div>
          <h2>GPendencias</h2>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
