<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Transcritor</title>
  <link rel="stylesheet" href="transcritor-exames.css">
  <link rel="stylesheet" href="../../shared/ui.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img src="../../shared/logo-stethoscope-c.svg" alt="">
        </div>
        <div>
          <h1>Transcritor</h1>
        </div>
      </div>
      <div class="toolbar-actions">
        <button id="autoBtn" class="source-btn auto-btn manual-source-hidden" type="button">Auto</button>
        <button id="campoLimpoBtn" class="source-btn campo-limpo-btn manual-source-hidden" type="button">Campo Limpo</button>
        <button id="jundiaiBtn" class="source-btn jundiai-btn manual-source-hidden" type="button">Jundiai</button>
        <button id="clearBtn" type="button">Limpar</button>
        <button id="copyBtn" class="primary" type="button">Copiar</button>
        <a class="home-link" href="../../index.html">Menu</a>
      </div>
    </header>

    <section class="workspace">
      <div class="panel">
        <div class="panel-head">
          <h2>Exame original</h2>
        </div>
        <textarea id="input" placeholder="Cole aqui o texto completo do exame laboratorial"></textarea>
      </div>

      <div class="panel result-panel">
        <div class="panel-head">
          <h2>Resultado transcrito</h2>
          <div id="detectedSource" class="detected-source">Origem: aguardando exame</div>
        </div>
        <pre id="output">Cole o exame ao lado para transcrever automaticamente.</pre>
      </div>
    </section>
  </main>
  <script src="../../shared/lab-transcriber.js"></script>
  <script src="../../shared/lab-transcriber-auto.js"></script>
  <script src="transcritor-exames.js"></script>
</body>
</html>
