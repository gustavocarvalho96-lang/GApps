<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Testes de regressao - Gustavo Plantao</title>
  <style>
    body {
      margin: 0;
      padding: 28px;
      background: #f7fafc;
      color: #0f172a;
      font-family: Arial, sans-serif;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    #results {
      display: grid;
      gap: 10px;
      max-width: 860px;
    }

    .test {
      border: 1px solid #d7dee8;
      border-radius: 8px;
      padding: 12px 14px;
      background: #ffffff;
    }

    .pass {
      border-left: 5px solid #16a34a;
    }

    .fail {
      border-left: 5px solid #dc2626;
    }

    .name {
      font-weight: 700;
    }

    .detail {
      margin-top: 4px;
      color: #475569;
      font-size: 14px;
    }

    .hidden-fixture {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Testes de regressao - Gustavo Plantao</h1>
  <div id="results"></div>

  <div class="hidden-fixture">
    <input id="search">
    <div id="quickList"></div>
    <div id="recipeList"></div>
    <main id="content"></main>
  </div>

  <script src="../GustavoPlantao_Portatil/GustavoPlantao_Portatil/app-data.js"></script>
  <script src="../shared/lab-transcriber.js"></script>
  <script src="../GustavoPlantao_Portatil/GustavoPlantao_Portatil/app.js"></script>
  <script>
    (function () {
      var results = document.getElementById("results");
      var tests = [];

      function add(name, fn) {
        tests.push({ name: name, fn: fn });
      }

      function byId(id) {
        return window.protocolsBase.find(function (protocol) {
          return protocol.id === id;
        });
      }

      function resetState() {
        state.selectedOption = 0;
        state.selectedAntibiotic = 0;
        state.selectedOrientationOption = 0;
        state.useParacetamolAlt = false;
        state.useEscopolaminaParacetamolAlt = false;
        state.useBisacodil = false;
        state.useGastroCipro = false;
      }

      function assert(condition, message) {
        if (!condition) throw new Error(message);
      }

      function show(name, ok, detail) {
        var item = document.createElement("div");
        item.className = "test " + (ok ? "pass" : "fail");
        item.innerHTML = "<div class=\"name\">" + (ok ? "OK: " : "ERRO: ") + name + "</div>" +
          "<div class=\"detail\">" + detail + "</div>";
        results.appendChild(item);
      }

      add("Enxaqueca troca ergotamina/dipirona por paracetamol", function () {
        resetState();
        state.useParacetamolAlt = true;
        var text = getPrescription(byId("enxaqueca"));
        assert(text.indexOf("Paracetamol 500mg") >= 0, "Paracetamol nao entrou na receita.");
        assert(text.toLowerCase().indexOf("diidroergotamina") < 0, "Medicamento com dipirona permaneceu.");
      });

      add("Dor aguda troca dipirona por paracetamol", function () {
        resetState();
        state.useParacetamolAlt = true;
        var text = getPrescription(byId("lombalgia"));
        assert(text.indexOf("Paracetamol 500mg") >= 0, "Paracetamol nao entrou na dor aguda.");
        assert(text.indexOf("Dipirona 500mg") < 0, "Dipirona permaneceu na dor aguda.");
      });

      add("Dor aguda geral tem sinais de alarme gerais", function () {
        resetState();
        state.selectedOrientationOption = 1;
        var text = getOrientation(byId("lombalgia"));
        assert(text.indexOf("Dor intensa ou progressiva") >= 0, "Orientacao geral nao foi selecionada.");
        assert(text.indexOf("dor no peito") >= 0 || text.indexOf("Dor no peito") >= 0, "Sinais gerais ficaram incompletos.");
      });

      add("Antibiotico da receita livre nao duplica Uso oral", function () {
        resetState();
        var firstAntibiotic = window.antibioticOptions[0].value;
        var inserted = firstAntibiotic.replace(/^\s*Uso oral:\s*/i, "");
        assert(inserted.indexOf("Uso oral:") !== 0, "Texto ainda comeca com Uso oral.");
      });

      add("Adicionais de receita sao definidos nos dados", function () {
        resetState();
        var constipacao = byId("constipacao");
        var gastro = byId("gastroenterite");
        assert(constipacao.addOns && constipacao.addOns.length === 1, "Constipacao sem addOn cadastrado.");
        assert(gastro.addOns && gastro.addOns.length === 1, "Gastroenterite sem addOn cadastrado.");
        state[constipacao.addOns[0].stateKey] = true;
        assert(getPrescription(constipacao).indexOf("Bisacodil 5mg") >= 0, "Bisacodil nao foi adicionado pela regra de dados.");
        state[gastro.addOns[0].stateKey] = true;
        assert(getPrescription(gastro).indexOf("Ciprofloxacino 500mg") >= 0, "Ciprofloxacino nao foi adicionado pela regra de dados.");
      });

      add("Atalhos administrativos e anamnese ficam em dados", function () {
        resetState();
        var administrativo = byId("administrativo");
        var anamnese = byId("anamnese");
        var reavaliacao = byId("reavaliacao");
        var receitaLivre = byId("receita-livre");
        assert(administrativo.snippets && administrativo.snippets.length >= 1, "Administrativo sem snippets.");
        assert(anamnese.genderedTemplate === true, "Anamnese sem marcador de template por genero.");
        assert(anamnese.snippets && anamnese.snippets.standardExam, "Anamnese sem exame padrao em dados.");
        assert(anamnese.snippets.otoOro && anamnese.snippets.otoOro.length >= 1, "Anamnese sem atalhos Oto/Oro em dados.");
        assert(anamnese.snippets.psych && anamnese.snippets.psych.length >= 1, "Anamnese sem atalhos psiquiatricos em dados.");
        assert(reavaliacao.labTranscription === true && reavaliacao.labSources.length === 2, "Reavaliacao sem fontes de transcricao nos dados.");
        assert(receitaLivre.freeGroupsEnabled === true, "Receita livre sem marcador de grupos livres.");
      });

      add("Transcritor Campo Limpo reconhece exames principais", function () {
        var sample = [
          "Paciente: JOAO TESTE",
          "Cadastro 08/05/2026",
          "HEMOGRAMA COMPLETO Hemoglobina 13,2 g/dL Hematócrito 40 % Leucócitos 8200 Plaquetas 250000",
          "CREATININA Resultado: 1,10 mg/dL",
          "UREIA Resultado: 35 mg/dL",
          "SÓDIO Resultado: 139 mmol/L",
          "POTÁSSIO Resultado: 4,2 mmol/L",
          "PROTEÍNA C REATIVA Resultado: 2,5 mg/dL",
          "TROPONINA Resultado: 12 ng/L"
        ].join("\\n");
        var text = transcribeCampoLimpoLabs(sample);
        assert(text.indexOf("JOAO TESTE") >= 0, "Paciente nao foi reconhecido.");
        assert(text.indexOf("08/05/2026") >= 0, "Data nao foi reconhecida.");
        assert(text.indexOf("hemograma") >= 0, "Hemograma nao foi reconhecido.");
        assert(text.indexOf("creatinina 1,10 mg/dL") >= 0, "Creatinina nao foi reconhecida.");
        assert(text.indexOf("troponina 12 ng/L") >= 0, "Troponina nao foi reconhecida.");
      });

      add("Transcritor Jundiai reconhece hemograma, plaquetas e troponina", function () {
        var sample = [
          "Paciente:",
          "CLAUDEMIR TESTE",
          "O.S.:",
          "2385-67694-29438",
          "-",
          "04/05/2026 - 14:01:58",
          "Hemograma Completo",
          "Hemoglobina",
          "5,1",
          "g/dL",
          "Hematócrito",
          "16,4",
          "%",
          "Leucócitos",
          "14,02",
          "Plaquetas",
          "477",
          "Mil/mm3",
          "Troponina",
          "Resultado",
          "48",
          "ng/L",
          "Problema ao visualizar"
        ].join("\\n");
        var text = transcribeJundiaiLabs(sample);
        assert(text.indexOf("CLAUDEMIR TESTE") >= 0, "Paciente Jundiai nao foi reconhecido.");
        assert(text.indexOf("04/05/2026") >= 0, "Data Jundiai nao foi reconhecida.");
        assert(text.indexOf("Leuco 14020") >= 0, "Leucocitos Jundiai nao foram convertidos para valor absoluto.");
        assert(text.indexOf("Plaq 477 mil") >= 0, "Plaquetas Jundiai nao ficaram em mil.");
        assert(text.indexOf("troponina 48 ng/L") >= 0, "Troponina Jundiai nao foi reconhecida.");
      });

      tests.forEach(function (test) {
        try {
          test.fn();
          show(test.name, true, "Passou.");
        } catch (error) {
          show(test.name, false, error.message);
        }
      });
    })();
  </script>
</body>
</html>
