<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plantão</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="../../shared/ui.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <img src="../../shared/logo-stethoscope-c.svg" alt="">
      </div>
      <div>
        <div class="brand-name">Plantão</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button id="atestaditeSidebarToggle" class="sidebar-visibility-toggle" type="button" aria-expanded="true">Atestadite</button>
      <a class="home-link" href="../Menu.html">Menu</a>
    </div>
  </header>
  <main class="app">
    <aside class="sidebar sidebar-quick">
      <div class="sidebar-head">
        <div class="sidebar-title">Ações rápidas</div>
      </div>
      <div class="list">
        <div id="quickList"></div>
      </div>
    </aside>
    <aside class="sidebar sidebar-recipes">
      <div class="sidebar-head">
        <div class="sidebar-title">Receitas</div>
      </div>
      <div class="list">
        <div id="recipeList"></div>
      </div>
    </aside>
    <aside id="atestaditeSidebar" class="sidebar sidebar-atestadite">
      <div class="sidebar-head">
        <div class="sidebar-title">Atestadite</div>
      </div>
      <div id="atestaditeMenuBody" class="list">
        <div id="atestaditeList"></div>
      </div>
    </aside>
    <aside id="scoreSidebar" class="sidebar sidebar-scores hidden">
      <div id="scorePanelContent" class="score-sidebar-content"></div>
    </aside>
    <section id="content" class="content"></section>
  </main>
  <script src="plantao-orientacoes-data.js"></script>
  <script src="plantao-encaminhamentos-data.js"></script>
  <script src="plantao-anamnese-data.js"></script>
  <script src="plantao-receitas-data.js"></script>
  <script src="app-data.js"></script>
  <script src="../../shared/lab-transcriber.js"></script>
  <script src="../../shared/lab-transcriber-auto.js"></script>
  <script src="plantao-copy-toast.js"></script>
  <script src="plantao-scores-cardio.js"></script>
  <script src="plantao-scores-respiratorio.js"></script>
  <script src="plantao-scores-neuro.js"></script>
  <script src="plantao-scores-abdome.js"></script>
  <script src="plantao-scores-tev.js"></script>
  <script src="plantao-scores.js"></script>
  <script src="plantao-reavaliacao.js"></script>
  <script src="plantao-receita-livre.js"></script>
  <script src="plantao-render.js"></script>
  <script src="app.js"></script>
</body>
</html>
