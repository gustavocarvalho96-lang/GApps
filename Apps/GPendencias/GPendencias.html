<!doctype html>

          <div class="form-actions top-actions">

            <div class="backup-menu">
              <button class="ghost-button backup-menu-button" type="button" id="backup-menu-button" aria-expanded="false">Backup</button>
              <div class="backup-menu-panel" id="backup-menu-panel" hidden>
                <button class="ghost-button" type="button" id="save-button">Salvar agora</button>

                <button class="ghost-button" type="button" id="restore-date-button">Restaurar data</button>

            <button class="primary-button" type="submit">Adicionar Paciente</button>

      </section>

      <section class="cards-workspace">

            <button class="filter-button" type="button" data-filter="done">Completas</button>
          </div>
        </section>

        <section class="list-area" aria-labelledby="list-title">

            <h2 id="list-title">Pacientes pendentes</h2>
