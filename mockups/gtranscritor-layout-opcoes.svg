<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1760" viewBox="0 0 1440 1760">
  <defs>
    <style>
      .bg{fill:#eef2f6}
      .title{font:900 30px Segoe UI,Arial,sans-serif;fill:#172033}
      .subtitle{font:700 15px Segoe UI,Arial,sans-serif;fill:#667085}
      .label{font:900 22px Segoe UI,Arial,sans-serif;fill:#172033}
      .small{font:700 13px Segoe UI,Arial,sans-serif;fill:#667085}
      .tiny{font:700 11px Segoe UI,Arial,sans-serif;fill:#94a3b8}
      .panel{fill:#fff;stroke:#d9e1ec;stroke-width:1.5}
      .soft{fill:#fbfcfe}
      .green{fill:#0f766e}
      .blue{fill:#2563eb}
      .violet{fill:#6d28d9}
      .line{stroke:#e5eaf1;stroke-width:1}
      .text{font:600 12px Segoe UI,Arial,sans-serif;fill:#334155}
      .mono{font:600 12px Consolas,monospace;fill:#243147}
      .button{fill:#0f766e}
      .buttonText{font:900 12px Segoe UI,Arial,sans-serif;fill:#fff}
      .ghost{fill:#fff;stroke:#d9e1ec;stroke-width:1}
      .ghostText{font:900 12px Segoe UI,Arial,sans-serif;fill:#344054}
      .chip{fill:#ede9fe}
      .chipText{font:900 12px Segoe UI,Arial,sans-serif;fill:#6d28d9}
    </style>
  </defs>
  <rect class="bg" width="1440" height="1760"/>
  <text x="56" y="58" class="title">GTranscritor - 5 caminhos visuais</text>
  <text x="56" y="86" class="subtitle">Mockups estáticos. Nenhuma mudança aplicada no app.</text>

  <!-- Option 1 -->
  <g transform="translate(56 126)">
    <rect class="panel" width="632" height="456" rx="22"/>
    <text x="24" y="42" class="label">1. Editor clínico</text>
    <text x="24" y="66" class="small">Mesmo fluxo atual, com barra superior mais útil.</text>
    <g transform="translate(24 92)">
      <image href="../shared/logo-stethoscope-c.svg" x="0" y="0" width="42" height="42"/>
      <text x="39" y="29" class="title" font-size="24">Transcritor</text>
      <rect class="chip" x="382" y="4" width="88" height="34" rx="17"/>
      <text class="chipText" x="408" y="26">Auto</text>
      <rect class="button" x="480" y="4" width="104" height="34" rx="10"/>
      <text class="buttonText" x="506" y="26">Copiar</text>
    </g>
    <g transform="translate(24 152)">
      <rect class="panel" width="280" height="264" rx="14"/>
      <text x="14" y="28" class="small">Exame original</text>
      <line class="line" x1="0" y1="46" x2="280" y2="46"/>
      <text x="14" y="76" class="mono">Hemograma Completo</text>
      <text x="14" y="102" class="mono">Hemoglobina 14,5 g/dL</text>
      <text x="14" y="128" class="mono">Leucócitos 4,25</text>
      <text x="14" y="154" class="mono">Troponina &lt; 1,5 ng/L</text>
    </g>
    <g transform="translate(328 152)">
      <rect class="panel" width="280" height="264" rx="14"/>
      <text x="14" y="28" class="small">Resultado transcrito</text>
      <line class="line" x1="0" y1="46" x2="280" y2="46"/>
      <text x="14" y="75" class="chipText">Origem: Jundiaí</text>
      <text x="14" y="112" class="mono">HELENA - Laboratórios:</text>
      <text x="14" y="138" class="mono">Hb 14,5; Leuco 4.250;</text>
      <text x="14" y="164" class="mono">Trop &lt; 1,5 ng/L.</text>
    </g>
  </g>

  <!-- Option 2 -->
  <g transform="translate(752 126)">
    <rect class="panel" width="632" height="456" rx="22"/>
    <text x="24" y="42" class="label">2. Pipeline</text>
    <text x="24" y="66" class="small">Dá sensação de processo inteligente sem explicar demais.</text>
    <g transform="translate(28 100)">
      <circle class="green" cx="18" cy="18" r="18"/><text class="buttonText" x="13" y="23">1</text>
      <rect class="line" x="48" y="17" width="150" height="2"/>
      <circle class="violet" cx="226" cy="18" r="18"/><text class="buttonText" x="221" y="23">2</text>
      <rect class="line" x="256" y="17" width="150" height="2"/>
      <circle class="blue" cx="434" cy="18" r="18"/><text class="buttonText" x="429" y="23">3</text>
      <text class="small" x="0" y="60">Colar</text>
      <text class="small" x="188" y="60">Detectar</text>
      <text class="small" x="397" y="60">Copiar</text>
    </g>
    <g transform="translate(24 190)">
      <rect class="panel" width="584" height="206" rx="14"/>
      <rect class="soft" x="0" y="0" width="292" height="206" rx="14"/>
      <line class="line" x1="292" y1="0" x2="292" y2="206"/>
      <text x="18" y="32" class="small">Entrada</text>
      <text x="318" y="32" class="small">Saída</text>
      <text x="18" y="72" class="mono">Texto bruto do laboratório...</text>
      <rect class="chip" x="318" y="58" width="118" height="30" rx="15"/>
      <text class="chipText" x="340" y="78">Jundiaí PDF</text>
      <text x="318" y="122" class="mono">Hb 12,3; Ht 37,7;</text>
      <text x="318" y="148" class="mono">Leuco 13.080; Plaq 291 mil.</text>
    </g>
  </g>

  <!-- Option 3 -->
  <g transform="translate(56 638)">
    <rect class="panel" width="632" height="456" rx="22"/>
    <text x="24" y="42" class="label">3. Resultado em destaque</text>
    <text x="24" y="66" class="small">A entrada fica neutra; o resultado vira o produto final.</text>
    <g transform="translate(24 104)">
      <rect class="ghost" width="226" height="292" rx="14"/>
      <text x="14" y="30" class="small">Exame original</text>
      <line class="line" x1="0" y1="48" x2="226" y2="48"/>
      <text x="14" y="82" class="tiny">Cole aqui o texto...</text>
      <text x="14" y="118" class="mono">Paciente:</text>
      <text x="14" y="144" class="mono">Coleta:</text>
      <text x="14" y="170" class="mono">Resultado:</text>
    </g>
    <g transform="translate(274 86)">
      <rect fill="#f7fbff" stroke="#b8d7ff" stroke-width="1.5" width="334" height="328" rx="18"/>
      <text x="18" y="36" class="label" font-size="20">Resultado transcrito</text>
      <rect class="chip" x="18" y="56" width="108" height="30" rx="15"/>
      <text class="chipText" x="38" y="76">Origem: Auto</text>
      <rect class="button" x="208" y="52" width="102" height="34" rx="10"/>
      <text class="buttonText" x="234" y="74">Copiar</text>
      <line class="line" x1="18" y1="104" x2="316" y2="104"/>
      <text x="18" y="142" class="mono">IREUDA - Laboratórios:</text>
      <text x="18" y="170" class="mono">Hb 12,3; Ht 37,7%;</text>
      <text x="18" y="198" class="mono">Leuco 13.080; Plaq 291 mil;</text>
      <text x="18" y="226" class="mono">Na 133; K 4,4; TGO 47;</text>
      <text x="18" y="254" class="mono">TGP 36; GGT 63; FA 67.</text>
    </g>
  </g>

  <!-- Option 4 -->
  <g transform="translate(752 638)">
    <rect class="panel" width="632" height="456" rx="22"/>
    <text x="24" y="42" class="label">4. Compacto profissional</text>
    <text x="24" y="66" class="small">Mais denso, rápido, com menos espaço vazio.</text>
    <g transform="translate(24 94)">
      <rect class="panel" width="584" height="54" rx="14"/>
      <image href="../shared/logo-stethoscope-c.svg" x="12" y="8" width="38" height="38"/>
      <text x="49" y="34" class="label" font-size="20">Transcritor</text>
      <rect class="chip" x="326" y="12" width="82" height="30" rx="15"/>
      <text class="chipText" x="350" y="32">Auto</text>
      <rect class="ghost" x="416" y="12" width="74" height="30" rx="9"/>
      <text class="ghostText" x="435" y="32">Limpar</text>
      <rect class="button" x="498" y="12" width="74" height="30" rx="9"/>
      <text class="buttonText" x="516" y="32">Copiar</text>
    </g>
    <g transform="translate(24 170)">
      <rect class="panel" width="584" height="226" rx="14"/>
      <line class="line" x1="292" y1="0" x2="292" y2="226"/>
      <text x="14" y="28" class="small">Original</text>
      <text x="306" y="28" class="small">Transcrito</text>
      <line class="line" x1="0" y1="44" x2="584" y2="44"/>
      <text x="14" y="76" class="mono">Hemograma Completo</text>
      <text x="14" y="102" class="mono">Ureia, sérica</text>
      <text x="14" y="128" class="mono">Creatinina</text>
      <text x="306" y="76" class="mono">Origem: Campo Limpo</text>
      <text x="306" y="112" class="mono">Hb 14,8; Leuco 14.210;</text>
      <text x="306" y="138" class="mono">U 48; Cr 1,10.</text>
    </g>
  </g>

  <!-- Option 5 -->
  <g transform="translate(404 1150)">
    <rect class="panel" width="632" height="456" rx="22"/>
    <text x="24" y="42" class="label">5. Barra lateral</text>
    <text x="24" y="66" class="small">Mais “app”, com comandos sempre fixos à esquerda.</text>
    <g transform="translate(24 94)">
      <rect fill="#0f172a" width="86" height="322" rx="18"/>
      <image href="../shared/logo-stethoscope-c.svg" x="18" y="18" width="50" height="50"/>
      <rect fill="#1f2937" x="14" y="92" width="58" height="44" rx="12"/>
      <text class="buttonText" x="29" y="120">Auto</text>
      <rect fill="#1f2937" x="14" y="150" width="58" height="44" rx="12"/>
      <text class="buttonText" x="26" y="178">Copiar</text>
      <rect fill="#1f2937" x="14" y="208" width="58" height="44" rx="12"/>
      <text class="buttonText" x="26" y="236">Limpar</text>
    </g>
    <g transform="translate(130 94)">
      <text x="0" y="28" class="label">Transcritor</text>
      <rect class="chip" x="392" y="4" width="92" height="30" rx="15"/>
      <text class="chipText" x="413" y="24">Jundiaí</text>
      <rect class="panel" y="58" width="230" height="264" rx="14"/>
      <rect fill="#f7fbff" stroke="#b8d7ff" stroke-width="1.5" x="254" y="58" width="230" height="264" rx="14"/>
      <text x="14" y="92" class="small">Exame original</text>
      <text x="268" y="92" class="small">Resultado</text>
      <line class="line" x1="0" y1="110" x2="230" y2="110"/>
      <line class="line" x1="254" y1="110" x2="484" y2="110"/>
      <text x="14" y="146" class="mono">Cole aqui...</text>
      <text x="268" y="146" class="mono">Hb 12,3; Ht 37,7;</text>
      <text x="268" y="172" class="mono">Leuco 13.080;</text>
      <text x="268" y="198" class="mono">TGO 47; TGP 36.</text>
    </g>
  </g>
</svg>
