<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f4f7fb; }
      .card { fill: #fff; stroke: #e2e8f0; stroke-width: 1; filter: url(#shadow); }
      .title { font-family: Inter, Arial, sans-serif; font-size: 28px; font-weight: 900; fill: #0f172a; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 900; fill: #0f172a; }
      .hint { font-family: Inter, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #64748b; }
      .btn { stroke-width: 1; }
      .glyph { font-family: Inter, Arial, sans-serif; font-size: 22px; font-weight: 900; dominant-baseline: middle; text-anchor: middle; }
      .small { font-size: 18px; }
      .pillText { font-family: Inter, Arial, sans-serif; font-size: 14px; font-weight: 900; dominant-baseline: middle; text-anchor: middle; }
      .bar { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
      .std { fill: #f0fdf4; stroke: #bbf7d0; }
      .stdText { fill: #166534; }
      .muted { fill: #f8fafc; stroke: #e2e8f0; }
      .mutedText { fill: #0f172a; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="title" x="52" y="64">Opcoes para o botao "fechar tudo"</text>
  <text class="hint" x="52" y="92">Mockup separado. Nenhuma dessas opcoes foi aplicada ao app.</text>

  <g transform="translate(52 128)">
    <rect class="card" x="0" y="0" width="1016" height="78" rx="24"/>
    <text class="label" x="26" y="47">1. Discreto neutro</text>
    <g transform="translate(250 19)">
      <circle class="btn muted" cx="20" cy="20" r="20"/>
      <text class="glyph mutedText" x="20" y="21">×</text>
      <circle class="btn std" cx="80" cy="20" r="20"/>
      <text class="glyph small stdText" x="80" y="21">↻</text>
      <circle class="btn std" cx="140" cy="20" r="20"/>
      <text class="glyph small stdText" x="140" y="21">🛡</text>
      <circle class="btn std" cx="200" cy="20" r="20"/>
      <text class="glyph small stdText" x="200" y="21">⚡</text>
      <circle class="btn muted" cx="260" cy="20" r="20"/>
      <text class="glyph small mutedText" x="260" y="21">🗑</text>
    </g>
    <text class="hint" x="590" y="46">Combina com a barra, menos alarmante.</text>
  </g>

  <g transform="translate(52 224)">
    <rect class="card" x="0" y="0" width="1016" height="78" rx="24"/>
    <text class="label" x="26" y="47">2. Vermelho suave</text>
    <g transform="translate(250 19)">
      <circle class="btn" cx="20" cy="20" r="20" fill="#fef2f2" stroke="#fecaca"/>
      <text class="glyph" x="20" y="21" fill="#ef4444">×</text>
      <circle class="btn std" cx="80" cy="20" r="20"/>
      <text class="glyph small stdText" x="80" y="21">↻</text>
      <circle class="btn std" cx="140" cy="20" r="20"/>
      <text class="glyph small stdText" x="140" y="21">🛡</text>
      <circle class="btn std" cx="200" cy="20" r="20"/>
      <text class="glyph small stdText" x="200" y="21">⚡</text>
      <circle class="btn muted" cx="260" cy="20" r="20"/>
      <text class="glyph small mutedText" x="260" y="21">🗑</text>
    </g>
    <text class="hint" x="590" y="46">Mantem o alerta, mas na mesma linguagem dos outros botoes.</text>
  </g>

  <g transform="translate(52 320)">
    <rect class="card" x="0" y="0" width="1016" height="78" rx="24"/>
    <text class="label" x="26" y="47">3. Vermelho cheio, menor</text>
    <g transform="translate(250 19)">
      <circle class="btn" cx="20" cy="20" r="20" fill="#ef4444" stroke="#ef4444"/>
      <text class="glyph" x="20" y="21" fill="#ffffff">×</text>
      <circle class="btn std" cx="80" cy="20" r="20"/>
      <text class="glyph small stdText" x="80" y="21">↻</text>
      <circle class="btn std" cx="140" cy="20" r="20"/>
      <text class="glyph small stdText" x="140" y="21">🛡</text>
      <circle class="btn std" cx="200" cy="20" r="20"/>
      <text class="glyph small stdText" x="200" y="21">⚡</text>
      <circle class="btn muted" cx="260" cy="20" r="20"/>
      <text class="glyph small mutedText" x="260" y="21">🗑</text>
    </g>
    <text class="hint" x="590" y="46">Mais proximo do atual, so que alinhado ao tamanho dos demais.</text>
  </g>

  <g transform="translate(52 416)">
    <rect class="card" x="0" y="0" width="1016" height="78" rx="24"/>
    <text class="label" x="26" y="47">4. Contorno vermelho</text>
    <g transform="translate(250 19)">
      <circle class="btn" cx="20" cy="20" r="20" fill="#ffffff" stroke="#ef4444"/>
      <text class="glyph" x="20" y="21" fill="#ef4444">×</text>
      <circle class="btn std" cx="80" cy="20" r="20"/>
      <text class="glyph small stdText" x="80" y="21">↻</text>
      <circle class="btn std" cx="140" cy="20" r="20"/>
      <text class="glyph small stdText" x="140" y="21">🛡</text>
      <circle class="btn std" cx="200" cy="20" r="20"/>
      <text class="glyph small stdText" x="200" y="21">⚡</text>
      <circle class="btn muted" cx="260" cy="20" r="20"/>
      <text class="glyph small mutedText" x="260" y="21">🗑</text>
    </g>
    <text class="hint" x="590" y="46">Leve e claro, bom se voce quer menos peso visual.</text>
  </g>

  <g transform="translate(52 512)">
    <rect class="card" x="0" y="0" width="1016" height="78" rx="24"/>
    <text class="label" x="26" y="47">5. Botao com texto curto</text>
    <g transform="translate(250 19)">
      <rect class="btn" x="0" y="0" width="92" height="40" rx="999" fill="#fef2f2" stroke="#fecaca"/>
      <text class="pillText" x="46" y="21" fill="#ef4444">× Tudo</text>
      <circle class="btn std" cx="132" cy="20" r="20"/>
      <text class="glyph small stdText" x="132" y="21">↻</text>
      <circle class="btn std" cx="192" cy="20" r="20"/>
      <text class="glyph small stdText" x="192" y="21">🛡</text>
      <circle class="btn std" cx="252" cy="20" r="20"/>
      <text class="glyph small stdText" x="252" y="21">⚡</text>
      <circle class="btn muted" cx="312" cy="20" r="20"/>
      <text class="glyph small mutedText" x="312" y="21">🗑</text>
    </g>
    <text class="hint" x="590" y="46">Mais explicito; ocupa mais espaco na barra.</text>
  </g>
</svg>
