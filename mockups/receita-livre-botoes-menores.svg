      <rect x="128" y="0" width="136" height="34" rx="9" fill="#fff" stroke="#d9e1ec"/>
      <text x="196" y="22" text-anchor="middle" fill="#344054">Nausea/Gastro</text>
      <rect x="272" y="0" width="166" height="34" rx="9" fill="#fff" stroke="#d9e1ec"/>
      <text x="355" y="22" text-anchor="middle" fill="#344054">Alergia/Respiratorio</text>
