<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f2230" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #eef3f7; }
      .panel { fill: rgba(255,255,255,.96); stroke: #dce5ef; stroke-width: 1; filter: url(#shadow); }
      .title { font-family: Inter, "Segoe UI", Arial, sans-serif; fill: #0f2230; font-weight: 900; letter-spacing: 0; }
      .hint { font-family: Inter, "Segoe UI", Arial, sans-serif; fill: #64748b; font-weight: 700; letter-spacing: 0; }
      .label { font-family: Inter, "Segoe UI", Arial, sans-serif; fill: #0f2230; font-size: 17px; font-weight: 900; letter-spacing: 0; }
      .caption { font-family: Inter, "Segoe UI", Arial, sans-serif; fill: #64748b; font-size: 13px; font-weight: 700; letter-spacing: 0; }
      .logoBox { fill: #fff; stroke: #dce5ef; stroke-width: 1; }
      .accent { fill: #0f766e; }
      .accent2 { fill: #2563eb; }
      .accent3 { fill: #c27a14; }
      .soft { fill: #ecfdf5; }
      .word { font-family: Inter, "Segoe UI", Arial, sans-serif; fill: #0f2230; font-weight: 950; letter-spacing: 0; }
      .mono { font-family: "Segoe UI", Arial, sans-serif; }
      .card { fill: #fff; stroke: #dce5ef; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="54" y="58" font-size="28">Opções para o cabeçalho GApps</text>
  <text class="hint" x="54" y="84" font-size="14">Mockup separado. Nada foi alterado no app.</text>

  <!-- Option 1 -->
  <g transform="translate(54 122)">
    <rect class="panel" width="516" height="158" rx="22"/>
    <text class="label" x="24" y="34">1. Logo grande + nome seco</text>
    <g transform="translate(186 50)">
      <rect class="logoBox" x="0" y="0" width="66" height="66" rx="17"/>
      <circle class="soft" cx="33" cy="33" r="24"/>
      <path class="accent" d="M34 13c9 0 16 7 16 16 0 13-16 25-16 25S18 42 18 29c0-9 7-16 16-16z"/>
      <rect class="accent2" x="30" y="20" width="8" height="27" rx="4"/>
      <rect class="accent2" x="21" y="30" width="26" height="8" rx="4"/>
      <text class="word" x="86" y="45" font-size="42">GApps</text>
    </g>
    <text class="caption" x="24" y="136">Mais próximo do atual, só mais compacto e limpo.</text>
  </g>

  <!-- Option 2 -->
  <g transform="translate(630 122)">
    <rect class="panel" width="516" height="158" rx="22"/>
    <text class="label" x="24" y="34">2. Marca em pílula</text>
    <g transform="translate(144 59)">
      <rect x="0" y="0" width="226" height="58" rx="999" fill="#fff" stroke="#dce5ef"/>
      <circle class="accent" cx="31" cy="29" r="17"/>
      <text x="31" y="36" font-family="Inter, Arial" font-size="21" font-weight="900" fill="#fff" text-anchor="middle">G</text>
      <text class="word" x="61" y="38" font-size="34">GApps</text>
    </g>
    <text class="caption" x="24" y="136">Fica com cara de produto/app launcher.</text>
  </g>

  <!-- Option 3 -->
  <g transform="translate(54 322)">
    <rect class="panel" width="516" height="158" rx="22"/>
    <text class="label" x="24" y="34">3. Minimalista central</text>
    <g transform="translate(206 56)">
      <text class="word" x="52" y="42" font-size="48" text-anchor="middle">GApps</text>
      <rect x="0" y="56" width="104" height="5" rx="999" fill="#0f766e"/>
    </g>
    <text class="caption" x="24" y="136">Menos visual, mais direto. Bom se os cards forem o foco.</text>
  </g>

  <!-- Option 4 -->
  <g transform="translate(630 322)">
    <rect class="panel" width="516" height="158" rx="22"/>
    <text class="label" x="24" y="34">4. Monograma + subtítulo</text>
    <g transform="translate(152 52)">
      <rect x="0" y="0" width="66" height="66" rx="20" fill="#0f766e"/>
      <text x="33" y="44" font-family="Inter, Arial" font-size="36" font-weight="950" fill="#fff" text-anchor="middle">G</text>
      <text class="word" x="84" y="33" font-size="36">GApps</text>
      <text class="hint" x="87" y="55" font-size="13">Plantão, fluxo, exames e pendências</text>
    </g>
    <text class="caption" x="24" y="136">Mais explicativo, ainda sem ocupar muito espaço.</text>
  </g>

  <!-- Option 5 -->
  <g transform="translate(54 522)">
    <rect class="panel" width="1092" height="158" rx="22"/>
    <text class="label" x="24" y="34">5. Barra compacta com apps</text>
    <g transform="translate(304 54)">
      <rect x="0" y="0" width="484" height="60" rx="18" fill="#fff" stroke="#dce5ef"/>
      <text class="word" x="28" y="39" font-size="34">GApps</text>
      <rect x="160" y="15" width="1" height="30" fill="#dce5ef"/>
      <circle class="accent" cx="198" cy="30" r="11"/>
      <circle class="accent2" cx="240" cy="30" r="11"/>
      <circle class="accent3" cx="282" cy="30" r="11"/>
      <circle cx="324" cy="30" r="11" fill="#64748b"/>
      <text class="hint" x="358" y="35" font-size="14">4 apps</text>
    </g>
    <text class="caption" x="24" y="136">Compacto e mostra que é uma central de aplicativos.</text>
  </g>
</svg>
