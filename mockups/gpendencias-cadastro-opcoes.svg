<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1880" viewBox="0 0 1440 1880">
  <defs>
    <style>
      .bg{fill:#f4f6f4}
      .panel{fill:#fff;stroke:#d8e0da;stroke-width:1.4}
      .soft{fill:#fbfcfb}
      .soft2{fill:#eef3ee}
      .accent{fill:#176b5d}
      .ink{fill:#17211b}
      .muted{fill:#5d6a62}
      .line{stroke:#d8e0da;stroke-width:1.2}
      .title{font:900 30px Arial,Helvetica,sans-serif;fill:#17211b}
      .subtitle{font:700 15px Arial,Helvetica,sans-serif;fill:#5d6a62}
      .h{font:900 22px Arial,Helvetica,sans-serif;fill:#17211b}
      .h2{font:900 16px Arial,Helvetica,sans-serif;fill:#17211b}
      .label{font:800 12px Arial,Helvetica,sans-serif;fill:#5d6a62}
      .text{font:700 13px Arial,Helvetica,sans-serif;fill:#17211b}
      .hint{font:700 11px Arial,Helvetica,sans-serif;fill:#7a877f}
      .btnText{font:900 12px Arial,Helvetica,sans-serif;fill:#fff}
      .ghostText{font:900 12px Arial,Helvetica,sans-serif;fill:#0d4d43}
      .input{fill:#fbfcfb;stroke:#d8e0da;stroke-width:1.2}
      .button{fill:#176b5d}
      .ghost{fill:#e9f2ef;stroke:#b7cec5;stroke-width:1}
      .danger{fill:#fffaf9;stroke:#efd9d5;stroke-width:1}
    </style>
  </defs>
  <rect class="bg" width="1440" height="1880"/>
  <text x="56" y="58" class="title">GPendencias - 5 opções para cadastro do paciente</text>
  <text x="56" y="86" class="subtitle">Mockups estáticos. Nenhuma mudança aplicada no app.</text>

  <!-- Option 1 -->
  <g transform="translate(56 126)">
    <rect class="panel" width="632" height="500" rx="16"/>
    <text x="24" y="42" class="h">1. Ficha compacta</text>
    <text x="24" y="66" class="subtitle">Um bloco único, mais limpo e rápido para plantão.</text>
    <g transform="translate(24 98)">
      <rect class="soft" width="584" height="344" rx="12" stroke="#d8e0da"/>
      <text x="18" y="32" class="h2">Novo paciente</text>
      <rect class="input" x="18" y="58" width="350" height="48" rx="8"/>
      <text x="32" y="79" class="label">Paciente</text>
      <text x="32" y="96" class="hint">Leito 12 - Maria S.</text>
      <rect class="input" x="384" y="58" width="182" height="48" rx="8"/>
      <text x="398" y="79" class="label">HD</text>
      <text x="398" y="96" class="hint">SCA? sepse?</text>
      <line class="line" x1="18" y1="128" x2="566" y2="128"/>
      <text x="18" y="158" class="h2">Pendência</text>
      <rect class="input" x="18" y="178" width="402" height="76" rx="8"/>
      <text x="32" y="200" class="label">Solicitação</text>
      <text x="32" y="220" class="hint">Checar troponina às 18h...</text>
      <rect class="input" x="436" y="178" width="130" height="38" rx="8"/>
      <text x="450" y="202" class="text">Exame</text>
      <rect class="ghost" x="436" y="226" width="130" height="34" rx="8"/>
      <text x="455" y="248" class="ghostText">+ outra</text>
      <rect class="button" x="18" y="286" width="548" height="42" rx="10"/>
      <text x="224" y="313" class="btnText">Adicionar pendência</text>
    </g>
  </g>

  <!-- Option 2 -->
  <g transform="translate(752 126)">
    <rect class="panel" width="632" height="500" rx="16"/>
    <text x="24" y="42" class="h">2. Duas colunas</text>
    <text x="24" y="66" class="subtitle">Paciente à esquerda, pendências à direita.</text>
    <g transform="translate(24 98)">
      <rect class="soft" width="242" height="344" rx="12" stroke="#d8e0da"/>
      <text x="18" y="32" class="h2">Paciente</text>
      <rect class="input" x="18" y="62" width="206" height="52" rx="8"/>
      <text x="32" y="84" class="label">Nome / leito</text>
      <text x="32" y="102" class="hint">Leito 12 - Maria S.</text>
      <rect class="input" x="18" y="132" width="206" height="52" rx="8"/>
      <text x="32" y="154" class="label">HD</text>
      <text x="32" y="172" class="hint">Pneumonia?</text>
      <rect class="soft2" x="18" y="214" width="206" height="96" rx="10"/>
      <text x="34" y="240" class="label">Resumo</text>
      <text x="34" y="264" class="text">1 paciente</text>
      <text x="34" y="288" class="text">1 pendência</text>
      <rect class="panel" x="266" y="0" width="318" height="344" rx="12"/>
      <text x="284" y="32" class="h2">Pendências</text>
      <rect class="panel" x="284" y="58" width="282" height="150" rx="10"/>
      <rect class="accent" x="284" y="58" width="4" height="150"/>
      <text x="302" y="88" class="label">Pendência 1</text>
      <text x="302" y="116" class="text">Checar resultado do exame</text>
      <text x="302" y="144" class="hint">Tipo: Exame</text>
      <rect class="ghost" x="302" y="164" width="86" height="30" rx="8"/>
      <text x="323" y="184" class="ghostText">+ outra</text>
      <rect class="button" x="284" y="284" width="282" height="42" rx="10"/>
      <text x="363" y="311" class="btnText">Adicionar</text>
    </g>
  </g>

  <!-- Option 3 -->
  <g transform="translate(56 682)">
    <rect class="panel" width="632" height="500" rx="16"/>
    <text x="24" y="42" class="h">3. Linha rápida</text>
    <text x="24" y="66" class="subtitle">Mais denso, com cara de ferramenta operacional.</text>
    <g transform="translate(24 104)">
      <rect class="panel" width="584" height="72" rx="12"/>
      <text x="18" y="29" class="label">Paciente</text>
      <text x="18" y="52" class="text">Leito 12 - Maria S.</text>
      <line class="line" x1="266" y1="14" x2="266" y2="58"/>
      <text x="286" y="29" class="label">HD</text>
      <text x="286" y="52" class="text">SCA?</text>
      <rect class="ghost" x="458" y="18" width="104" height="36" rx="9"/>
      <text x="487" y="41" class="ghostText">Limpar</text>
      <rect class="panel" y="94" width="584" height="172" rx="12"/>
      <text x="18" y="126" class="label">Solicitação</text>
      <text x="18" y="158" class="text">Checar troponina às 18h e reavaliar dor torácica</text>
      <rect class="soft2" x="18" y="190" width="86" height="28" rx="14"/>
      <text x="42" y="209" class="ghostText">Exame</text>
      <rect class="ghost" x="458" y="202" width="104" height="36" rx="9"/>
      <text x="480" y="225" class="ghostText">+ outra</text>
      <rect class="button" y="292" width="584" height="44" rx="10"/>
      <text x="225" y="320" class="btnText">Adicionar pendência</text>
    </g>
  </g>

  <!-- Option 4 -->
  <g transform="translate(752 682)">
    <rect class="panel" width="632" height="500" rx="16"/>
    <text x="24" y="42" class="h">4. Cartão do paciente</text>
    <text x="24" y="66" class="subtitle">O cadastro já parece o card que será criado.</text>
    <g transform="translate(126 100)">
      <rect class="panel" width="380" height="350" rx="14"/>
      <rect class="accent" width="5" height="350" rx="3"/>
      <text x="24" y="36" class="h2">Leito 12 - Maria S.</text>
      <rect class="soft2" x="24" y="52" width="92" height="28" rx="14"/>
      <text x="42" y="71" class="ghostText">HD: SCA?</text>
      <line class="line" x1="24" y1="100" x2="356" y2="100"/>
      <text x="24" y="132" class="label">Adicionar solicitação</text>
      <rect class="input" x="24" y="150" width="332" height="86" rx="8"/>
      <text x="38" y="174" class="hint">Checar troponina às 18h...</text>
      <rect class="input" x="24" y="250" width="132" height="38" rx="8"/>
      <text x="42" y="274" class="text">Exame</text>
      <rect class="ghost" x="170" y="250" width="92" height="38" rx="9"/>
      <text x="193" y="274" class="ghostText">+ outra</text>
      <rect class="button" x="24" y="304" width="332" height="34" rx="9"/>
      <text x="130" y="326" class="btnText">Criar card</text>
    </g>
  </g>

  <!-- Option 5 -->
  <g transform="translate(404 1238)">
    <rect class="panel" width="632" height="500" rx="16"/>
    <text x="24" y="42" class="h">5. Comando central</text>
    <text x="24" y="66" class="subtitle">Um painel menor no centro, com foco em velocidade.</text>
    <g transform="translate(78 104)">
      <rect class="panel" width="476" height="334" rx="16"/>
      <text x="22" y="38" class="h2">Nova pendência</text>
      <rect class="input" x="22" y="64" width="432" height="44" rx="8"/>
      <text x="36" y="91" class="hint">Paciente ou leito</text>
      <rect class="input" x="22" y="120" width="206" height="44" rx="8"/>
      <text x="36" y="147" class="hint">HD</text>
      <rect class="input" x="248" y="120" width="206" height="44" rx="8"/>
      <text x="262" y="147" class="text">Exame</text>
      <rect class="input" x="22" y="178" width="432" height="78" rx="8"/>
      <text x="36" y="205" class="hint">O que precisa ficar pendente?</text>
      <rect class="ghost" x="22" y="276" width="126" height="38" rx="9"/>
      <text x="51" y="300" class="ghostText">+ outra</text>
      <rect class="button" x="164" y="276" width="290" height="38" rx="9"/>
      <text x="239" y="300" class="btnText">Adicionar pendência</text>
    </g>
  </g>
</svg>
