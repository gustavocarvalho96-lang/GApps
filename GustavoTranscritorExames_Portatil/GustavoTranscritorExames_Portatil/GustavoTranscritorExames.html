<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GustavoTranscritor Exames</title>
  <link rel="stylesheet" href="transcritor-exames.css">
  <link rel="stylesheet" href="../../shared/ui.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img">
            <path class="logo-g" d="M45 17c-4-4-10-6-16-5-11 1-19 10-19 21s8 20 20 20c10 0 18-7 20-16H34" />
            <path class="logo-scope" d="M21 11v17c0 6 5 11 11 11s11-5 11-11V11" />
            <path class="logo-scope" d="M43 28c0 8 5 14 13 14" />
            <circle class="logo-chest" cx="56" cy="42" r="4" />
          </svg>
        </div>
        <div>
          <h1>GustavoTranscritor</h1>
        </div>
      </div>
      <button id="copyBtn" class="primary" type="button">Copiar resultado</button>
      <a class="home-link" href="../../index.html">Inicio</a>
    </header>

    <section class="workspace">
      <div class="panel">
        <div class="panel-head">
          <h2>Exame original</h2>
          <button id="clearBtn" type="button">Limpar</button>
        </div>
        <textarea id="input" placeholder="Cole aqui o texto completo do exame laboratorial"></textarea>
      </div>

      <div class="panel result-panel">
        <div class="panel-head">
          <h2>Resultado transcrito</h2>
          <div class="button-row">
            <button id="campoLimpoBtn" class="source-btn campo-limpo-btn" type="button">Campo Limpo</button>
            <button id="jundiaiBtn" class="source-btn jundiai-btn" type="button">Jundiai</button>
          </div>
        </div>
        <pre id="output">Cole o exame ao lado e clique em Transcrever exames.</pre>
      </div>
    </section>
  </main>
  <script src="../../shared/lab-transcriber.js"></script>
  <script src="transcritor-exames.js"></script>
</body>
</html>
