<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GustavoTranscritor Exames</title>
  <link rel="stylesheet" href="transcritor-exames.css">
  <link rel="stylesheet" href="../../shared/ui.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img">
            <path class="logo-shadow" d="M45 14c-4-3-9-5-16-4-12 1-21 10-21 22s9 22 22 22c10 0 18-6 21-16H35" />
            <path class="logo-tube" d="M45 14c-4-3-9-5-16-4-12 1-21 10-21 22s9 22 22 22c10 0 18-6 21-16H35" />
            <path class="logo-shadow" d="M35 38h16c0 8 5 13 10 13" />
            <path class="logo-tube" d="M35 38h16c0 8 5 13 10 13" />
            <path class="logo-ear-line" d="M17 13v-7" />
            <path class="logo-ear-line" d="M29 10v-7" />
            <circle class="logo-ear" cx="17" cy="6" r="3.2" />
            <circle class="logo-ear" cx="29" cy="3" r="3.2" />
            <circle class="logo-chest-ring" cx="58" cy="51" r="6" />
            <circle class="logo-chest" cx="58" cy="51" r="3.2" />
          </svg>
        </div>
        <div>
          <h1>GustavoTranscritor</h1>
        </div>
      </div>
      <button id="copyBtn" class="primary" type="button">Copiar resultado</button>
      <a class="home-link" href="../../index.html">Inicio</a>
    </header>

    <section class="workspace">
      <div class="panel">
        <div class="panel-head">
          <h2>Exame original</h2>
          <button id="clearBtn" type="button">Limpar</button>
        </div>
        <textarea id="input" placeholder="Cole aqui o texto completo do exame laboratorial"></textarea>
      </div>

      <div class="panel result-panel">
        <div class="panel-head">
          <h2>Resultado transcrito</h2>
          <div class="button-row">
            <button id="campoLimpoBtn" class="source-btn campo-limpo-btn" type="button">Campo Limpo</button>
            <button id="jundiaiBtn" class="source-btn jundiai-btn" type="button">Jundiai</button>
          </div>
        </div>
        <pre id="output">Cole o exame ao lado e clique em Transcrever exames.</pre>
      </div>
    </section>
  </main>
  <script src="../../shared/lab-transcriber.js"></script>
  <script src="transcritor-exames.js"></script>
</body>
</html>
