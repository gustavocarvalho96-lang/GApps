<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GustavoPlantão - App Portatil</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">G</div>
      <div>
        <div class="brand-name">GustavoPlantão</div>
        <div class="brand-subtitle">Protocolos, receitas e textos clinicos</div>
      </div>
    </div>
    <div class="topbar-status">
      <span>Offline</span>
      <strong>App portatil</strong>
    </div>
  </header>
  <main class="app">
    <aside class="sidebar">
      <div class="search-box">
        <input id="search" type="search" placeholder="Buscar topico, sintoma ou categoria" autocomplete="off">
      </div>
      <div class="list">
        <details class="nav-group" open>
          <summary class="group-toggle">
            <span>ACOES RAPIDAS</span>
            <span class="chevron">v</span>
          </summary>
          <div id="quickList"></div>
        </details>
        <details class="nav-group" open>
          <summary class="group-toggle rest-title">
            <span>RECEITAS</span>
            <span class="chevron">v</span>
          </summary>
          <div id="recipeList"></div>
        </details>
      </div>
    </aside>
    <section id="content" class="content"></section>
  </main>
  <script src="app-data.js"></script>
  <script src="../../shared/lab-transcriber.js"></script>
  <script src="app.js"></script>
</body>
</html>
