<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GustavoPlantão - App Portatil</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">G</div>
      <div>
        <div class="brand-name">GustavoPlantão</div>
        <div class="brand-subtitle">Protocolos, receitas e textos clinicos</div>
      </div>
    </div>
    <div class="topbar-status">
      <span>Offline</span>
      <strong>App portatil</strong>
    </div>
  </header>
  <main class="app">
    <aside class="sidebar sidebar-quick">
      <div class="sidebar-head">
        <div class="sidebar-title">Ações rápidas</div>
      </div>
      <div class="list">
        <div id="quickList"></div>
      </div>
    </aside>
    <aside class="sidebar sidebar-recipes">
      <div class="sidebar-head">
        <div class="sidebar-title">Receitas</div>
        <div class="sidebar-caption">Protocolos e prescrições por queixa.</div>
      </div>
      <div class="search-box">
        <input id="recipeSearch" type="search" placeholder="Buscar receitas" autocomplete="off">
      </div>
      <div class="list">
        <div id="recipeList"></div>
      </div>
    </aside>
    <section id="content" class="content"></section>
  </main>
  <script src="app-data.js"></script>
  <script src="../../shared/lab-transcriber.js"></script>
  <script src="app.js"></script>
</body>
</html>
