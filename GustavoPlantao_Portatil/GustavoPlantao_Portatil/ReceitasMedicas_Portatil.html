          <path class="logo-tube" d="M45 14c-4-3-9-5-16-4-12 1-21 10-21 22s9 22 22 22c10 0 18-6 21-16H35" />
          <path class="logo-shadow" d="M35 38h16c0 8 5 13 10 13" />

      </div>

        <div class="sidebar-title">Ações rápidas</div>
      </div>

        <div class="sidebar-title">Receitas</div>
      </div>

    </aside>
    <aside id="scoreSidebar" class="sidebar sidebar-scores hidden">

    </aside>
    <section id="content" class="content"></section>
  </main>
